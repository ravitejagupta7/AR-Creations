<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Creations - Necklace Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR SAME DESIGN */
:root {
  --rose: #c0394b;
  --gold: #c9a84c;
  --bg: #fdf6f0;
}
body { font-family:'Jost',sans-serif; background:var(--bg); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; padding:20px;}
.card { background:#fff; border-radius:12px; overflow:hidden;}
.card img { width:100%; height:220px; object-fit:cover; cursor:pointer;}
.wa-btn { background:#25d366; color:#fff; border:none; padding:10px; width:100%;}
</style>
</head>

<body>

<header style="text-align:center;padding:20px;background:#1a0a0e;color:white">
<h1>AR Creations</h1>
<p>📞 8897762172</p>
</header>

<div class="grid" id="grid"></div>

<!-- ✅ IMAGE MODAL -->
<div id="imgModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:999;">
  <span onclick="closeImg()" style="position:absolute; top:20px; right:30px; color:white; font-size:30px; cursor:pointer;">×</span>
  <img id="popupImg" style="max-width:90%; max-height:90%;">
</div>

<script>

const products = [
  {
    name: "Classic Gold Choker",
    price: "1199",
    image: "https://i.ibb.co/cXNVNKgT/image.jpg"
  },
  {
    name: "Bridal Haar Set",
    price: "2499",
    image: "https://i.ibb.co/G4djQYbZ/image.jpg"
  },
  {
    name: "Simple Pearl Drop",
    price: "699",
    image: "https://i.ibb.co/6RBBT665/image.jpg"
  }
];

function openImg(src){
  document.getElementById("imgModal").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closeImg(){
  document.getElementById("imgModal").style.display = "none";
}

function orderNow(name, price, image){
  const msg = `Hi! I want to order ${name} (₹${price})\nImage: ${image}`;
  window.open("https://wa.me/918897762172?text=" + encodeURIComponent(msg), "_blank");
}

function render(){
  const grid = document.getElementById("grid");

  grid.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image}" onclick="openImg('${p.image}')">
      <div style="padding:10px">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="wa-btn" onclick="orderNow('${p.name}','${p.price}','${p.image}')">
          Order on WhatsApp
        </button>
      </div>
    </div>
  `).join('');
}

render();

</script>

</body>
</html>
