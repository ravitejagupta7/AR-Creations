<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Creations - Necklace Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose: #c0394b;
      --rose-dark: #9b2335;
      --rose-light: #fce8eb;
      --gold: #c9a84c;
      --gold-light: #f5e9c8;
      --bg: #fdf6f0;
      --white: #ffffff;
      --text: #1a1a1a;
      --muted: #7a6a6a;
      --border: #e8d5d5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Jost', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a0a0e 0%, #2d1018 50%, #1a0a0e 100%);
      color: white;
      text-align: center;
      padding: 40px 20px 32px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(201,168,76,0.03) 30px, rgba(201,168,76,0.03) 31px);
    }
    .logo-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 50%;
      border: 2px solid var(--gold); color: var(--gold);
      font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700;
      margin-bottom: 14px; position: relative; z-index: 1;
      animation: fadeDown 0.6s ease both;
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 6vw, 44px); font-weight: 700; letter-spacing: 3px;
      position: relative; z-index: 1; animation: fadeDown 0.7s ease both;
    }
    .header-sub {
      color: var(--gold); font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
      margin-top: 6px; position: relative; z-index: 1; animation: fadeDown 0.8s ease both;
    }
    .header-divider {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin: 16px auto 12px; width: 200px; position: relative; z-index: 1;
    }
    .header-divider span { flex: 1; height: 1px; background: rgba(201,168,76,0.4); }
    .header-divider i { color: var(--gold); font-size: 10px; }
    .header-phone {
      color: rgba(255,255,255,0.75); font-size: 13px; letter-spacing: 1px;
      position: relative; z-index: 1; animation: fadeDown 0.9s ease both;
    }

    .filters {
      display: flex; justify-content: center; gap: 8px;
      padding: 24px 16px 8px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 22px; border-radius: 999px; border: 1.5px solid var(--border);
      background: transparent; cursor: pointer; font-family: 'Jost', sans-serif;
      font-size: 13px; font-weight: 500; letter-spacing: 1px;
      color: var(--muted); transition: all 0.25s ease;
    }
    .filter-btn:hover { border-color: var(--rose); color: var(--rose); }
    .filter-btn.active {
      background: var(--rose); border-color: var(--rose); color: white;
      box-shadow: 0 4px 14px rgba(192,57,75,0.3);
    }

    .section-title {
      text-align: center; padding: 16px 16px 4px;
      font-family: 'Cormorant Garamond', serif; font-size: 13px;
      letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px; padding: 16px 20px 40px; max-width: 1100px; margin: 0 auto;
    }

    .card {
      background: var(--white); border-radius: 16px; overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
      animation: fadeUp 0.5s ease both;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(192,57,75,0.12); }
    .card-img-wrap { position: relative; overflow: hidden; cursor: zoom-in; }
    .card img {
      width: 100%; height: 220px; object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .card:hover img { transform: scale(1.05); }
    .card-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(26,10,14,0.75); color: var(--gold);
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 10px; border-radius: 999px; backdrop-filter: blur(4px);
    }
    .zoom-hint {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.55); color: white;
      font-size: 11px; padding: 4px 10px; border-radius: 999px;
      opacity: 0; transition: opacity 0.2s ease; letter-spacing: 0.5px;
    }
    .card-img-wrap:hover .zoom-hint { opacity: 1; }
    .card-body { padding: 14px 16px 16px; }
    .card-name {
      font-family: 'Cormorant Garamond', serif; font-size: 18px;
      font-weight: 600; line-height: 1.3; margin-bottom: 4px;
    }
    .card-price { color: var(--rose); font-size: 17px; font-weight: 600; margin-bottom: 12px; }
    .wa-btn {
      display: block; width: 100%; background: #25d366; color: white;
      border: none; padding: 10px; border-radius: 10px;
      font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: 0.5px; cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .wa-btn:hover { background: #1ebe5d; transform: scale(1.02); }

    .empty {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: var(--muted); font-size: 15px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92); z-index: 1000;
      align-items: center; justify-content: center;
      padding: 20px; animation: fadeIn 0.2s ease;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      position: relative; max-width: 480px; width: 100%;
      background: var(--white); border-radius: 20px; overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: scaleIn 0.25s ease;
    }
    .lightbox-inner img {
      width: 100%; max-height: 65vh; object-fit: contain;
      display: block; background: #f5f0eb;
    }
    .lightbox-info {
      padding: 14px 20px 8px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    .lightbox-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px; font-weight: 600;
    }
    .lightbox-price {
      color: var(--rose); font-size: 18px;
      font-weight: 600; white-space: nowrap;
    }
    .lightbox-close {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.55); color: white; border: none;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .lightbox-wa {
      display: block; width: calc(100% - 40px);
      margin: 8px 20px 18px; background: #25d366; color: white;
      border: none; padding: 12px; border-radius: 10px;
      font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.2s ease; text-align: center;
    }
    .lightbox-wa:hover { background: #1ebe5d; }

    footer {
      background: linear-gradient(135deg, #1a0a0e 0%, #2d1018 100%);
      color: rgba(255,255,255,0.6); text-align: center;
      padding: 24px 16px; font-size: 13px; letter-spacing: 1px;
    }
    footer strong { color: var(--gold); }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn  { from { transform:scale(0.92); opacity:0; } to { transform:scale(1); opacity:1; } }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
      .card img { height: 160px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">AR</div>
  <h1>AR Creations</h1>
  <p class="header-sub">One Gram Gold Collection</p>
  <div class="header-divider"><span></span><i>✦</i><span></span></div>
  <p class="header-phone">📞 +91 88977 62172</p>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="filter('All', this)">All</button>
  <button class="filter-btn" onclick="filter('Bridal', this)">Bridal</button>
  <button class="filter-btn" onclick="filter('Daily', this)">Daily Wear</button>
</div>

<p class="section-title" id="sectionLabel">All Pieces</p>
<div class="grid" id="grid"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxBg(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lb-img" src="" alt="">
    <div class="lightbox-info">
      <div class="lightbox-name" id="lb-name"></div>
      <div class="lightbox-price" id="lb-price"></div>
    </div>
    <button class="lightbox-wa" id="lb-wa">🟢 Order on WhatsApp</button>
  </div>
</div>

<footer>
  <p>© 2026 <strong>AR Creations</strong> · Handcrafted with ♥</p>
  <p style="margin-top:6px;">📞 +91 88977 62172</p>
</footer>

<script>
  const products = [
    {
      name: "Lakshmi Temple Necklace Set",
      price: "1299",
      image: "https://i.ibb.co/Pz505smC/Whats-App-Image-2026-04-23-at-11-13-46-AM.jpg",
      category: "Bridal"
    },
    {
      name: "Ruby Emerald Haram Set",
      price: "2499",
      image: "https://i.ibb.co/Pvr8GXf2/Whats-App-Image-2026-04-23-at-11-13-49-AM.jpg",
      category: "Bridal"
    },
    {
      name: "Coloured Stone Drop Chain",
      price: "849",
      image: "https://i.ibb.co/placeholder/stone-drop.jpg",
      category: "Daily"
    }
  ];

  let current = 'All';

  function openLightbox(idx) {
    const p = products[idx];
    document.getElementById('lb-img').src = p.image;
    document.getElementById('lb-img').alt = p.name;
    document.getElementById('lb-name').textContent = p.name;
    document.getElementById('lb-price').textContent = '₹' + p.price;
    document.getElementById('lb-wa').onclick = () => orderWA(p);
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeLightboxBg(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  }

  function orderWA(p) {
    const msg = `Hi AR Creations! 🙏\n\nI want to order:\n*${p.name}*\nPrice: ₹${p.price}\n\nProduct image: ${p.image}`;
    window.open('https://wa.me/918897762172?text=' + encodeURIComponent(msg), '_blank');
  }

  function render() {
    const grid = document.getElementById('grid');
    const label = document.getElementById('sectionLabel');
    const list = current === 'All' ? products : products.filter(p => p.category === current);

    label.textContent = current === 'All' ? 'All Pieces' : current === 'Bridal' ? 'Bridal Collection' : 'Daily Wear';

    if (list.length === 0) {
      grid.innerHTML = '<div class="empty">No products in this category yet.</div>';
      return;
    }

    grid.innerHTML = list.map((p, i) => {
      const idx = products.indexOf(p);
      return `
        <div class="card" style="animation-delay:${i * 0.07}s">
          <div class="card-img-wrap" onclick="openLightbox(${idx})">
            <img src="${p.image}" alt="${p.name}"
                 onerror="this.src='https://placehold.co/400x440/f5e9c8/9b2335?text=${encodeURIComponent(p.name)}'">
            <span class="card-badge">${p.category === 'Bridal' ? 'Bridal' : 'Daily Wear'}</span>
            <span class="zoom-hint">🔍 View</span>
          </div>
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-price">₹${p.price}</div>
            <button class="wa-btn" onclick="orderWA(products[${idx}])">🟢 Order on WhatsApp</button>
          </div>
        </div>`;
    }).join('');
  }

  function filter(cat, btn) {
    current = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  render();
</script>
</body>
</html>
